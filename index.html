<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pwriter | Advanced Deep AI Prompt Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --neon: #00f2ff; --neon-purple: #b026ff; --bg: #030305; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #e0e0e0; }
        .neon-border { border: 1px solid rgba(0, 242, 255, 0.15); transition: all 0.3s ease; }
        .neon-border:hover { border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .glass-morphism { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .layer-badge { font-size: 9px; padding: 5px 12px; border-radius: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 242, 255, 0.6); }

        /* Typing cursor animation */
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; color: var(--neon); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">

    <nav class="h-16 border-b border-white/5 flex items-center justify-between px-8 glass-morphism z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.3)]">
                <i data-lucide="terminal-square" class="w-6 h-6 text-black"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white leading-none">pwriter<span class="text-cyan-400">.</span></h1>
                <p class="text-[10px] text-cyan-400/70 font-mono tracking-widest uppercase mt-0.5">7-Layer Deep Architecture</p>
            </div>
        </div>
        <div class="flex items-center gap-6 text-sm font-medium">
            <div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-xs">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM ONLINE
            </div>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden relative">
        <aside class="w-20 border-r border-white/5 flex flex-col items-center py-8 gap-8 glass-morphism z-40">
            <button class="p-3 rounded-xl bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 hover:bg-cyan-500 hover:text-black transition"><i data-lucide="layers" class="w-5 h-5"></i></button>
            <button class="p-3 rounded-xl text-slate-500 hover:text-white transition" title="History"><i data-lucide="history" class="w-5 h-5"></i></button>
            <button class="p-3 rounded-xl text-slate-500 hover:text-white transition" title="Settings"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </aside>

        <main class="flex-1 p-6 lg:p-8 grid grid-cols-12 gap-6 overflow-y-auto">
            
            <div class="col-span-12 lg:col-span-5 flex flex-col gap-6">
                <div class="p-6 rounded-3xl glass-morphism neon-border flex-1 flex flex-col gap-5">
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-bold text-white flex items-center gap-2">
                            <i data-lucide="cpu" class="text-cyan-400 w-5 h-5"></i> Objective Core
                        </h2>
                        <button onclick="clearInput()" class="text-xs text-slate-500 hover:text-red-400 transition flex items-center gap-1">
                            <i data-lucide="trash-2" class="w-3 h-3"></i> Clear
                        </button>
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Define The Objective</label>
                        <textarea id="raw-input" class="flex-1 w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-cyan-50 font-mono text-sm focus:border-cyan-500 outline-none transition resize-none custom-scrollbar" placeholder="What exactly do you want the AI to generate? Provide details, data, and context..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 rounded-xl bg-black/40 border border-white/5">
                            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Target Engine</label>
                            <select id="target" class="bg-transparent text-sm font-semibold w-full outline-none text-white cursor-pointer appearance-none">
                                <option value="ChatGPT (GPT-4o)" class="bg-gray-900">ChatGPT (GPT-4o)</option>
                                <option value="Claude 3.5 Sonnet" class="bg-gray-900">Claude 3.5</option>
                                <option value="Gemini 1.5 Pro" class="bg-gray-900">Gemini 1.5 Pro</option>
                            </select>
                        </div>
                        <div class="p-3 rounded-xl bg-black/40 border border-white/5">
                            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Tone & Voice</label>
                            <select id="tone" class="bg-transparent text-sm font-semibold w-full outline-none text-white cursor-pointer appearance-none">
                                <option value="Highly Professional & Authoritative" class="bg-gray-900">Professional</option>
                                <option value="Academic & Research-focused" class="bg-gray-900">Academic</option>
                                <option value="Direct, Concise & Technical" class="bg-gray-900">Technical</option>
                                <option value="Creative & Engaging" class="bg-gray-900">Creative</option>
                            </select>
                        </div>
                        <div class="p-3 rounded-xl bg-black/40 border border-white/5 col-span-2">
                            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Output Structure Constraint</label>
                            <select id="format" class="bg-transparent text-sm font-semibold w-full outline-none text-white cursor-pointer appearance-none">
                                <option value="Structured Markdown with Clear Headers and Bullet Points" class="bg-gray-900">Structured Markdown</option>
                                <option value="Clean Code Blocks with Inline Comments" class="bg-gray-900">Code & Documentation</option>
                                <option value="Valid JSON Object (Strictly NO extra text)" class="bg-gray-900">Strict JSON</option>
                                <option value="Comprehensive Essay / Detailed Report" class="bg-gray-900">Detailed Report</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="generateDeepPrompt()" class="w-full py-4 mt-2 bg-gradient-to-r from-cyan-600 to-cyan-400 text-black font-black text-sm uppercase tracking-wider rounded-xl hover:shadow-[0_0_25px_rgba(0,242,255,0.4)] transition-all duration-300 flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                        Build 7-Layer Prompt <i data-lucide="zap" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-7 flex flex-col">
                <div id="output-container" class="flex-1 p-6 rounded-3xl glass-morphism neon-border relative flex flex-col h-[600px] lg:h-auto">
                    
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 pb-4 border-b border-white/5">
                        <div class="flex flex-wrap gap-1.5">
                            <span class="layer-badge bg-blue-500/10 text-blue-400 border border-blue-500/20">ROLE</span>
                            <span class="layer-badge bg-purple-500/10 text-purple-400 border border-purple-500/20">CONTEXT</span>
                            <span class="layer-badge bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">OBJECTIVE</span>
                            <span class="layer-badge bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">THINKING</span>
                            <span class="layer-badge bg-orange-500/10 text-orange-400 border border-orange-500/20">FORMAT</span>
                            <span class="layer-badge bg-red-500/10 text-red-400 border border-red-500/20">CONSTRAINTS</span>
                            <span class="layer-badge bg-green-500/10 text-green-400 border border-green-500/20">QUALITY</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyToClipboard()" class="flex items-center gap-1.5 text-[11px] font-bold bg-white/5 hover:bg-cyan-500 hover:text-black text-white px-4 py-2 rounded-lg transition border border-white/10">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> COPY
                            </button>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 relative">
                        <pre id="prompt-display" class="font-mono text-[13.5px] leading-relaxed text-slate-500 whitespace-pre-wrap">Awaiting parameters to construct 7-Layer Architecture...</pre>
                    </div>

                    <div class="mt-4 pt-3 border-t border-white/5 flex justify-between items-center text-[10px] text-slate-500 font-mono">
                        <span id="status-text">Status: Idle</span>
                        <span id="word-count">Est. Length: 0 Words</span>
                    </div>

                    <div id="loader" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-10 backdrop-blur-md rounded-3xl">
                        <div class="relative w-16 h-16 mb-6">
                            <div class="absolute inset-0 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
                            <div class="absolute inset-2 border-4 border-purple-500/20 border-b-purple-500 rounded-full animate-spin-slow"></div>
                            <i data-lucide="cpu" class="absolute inset-0 m-auto w-6 h-6 text-cyan-400 animate-pulse"></i>
                        </div>
                        <p class="text-[11px] font-black tracking-[0.2em] text-cyan-400">SYNTHESIZING 7-LAYER LOGIC...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let typingInterval; 

        function clearInput() {
            document.getElementById('raw-input').value = '';
            document.getElementById('raw-input').focus();
        }

        function generateDeepPrompt() {
            const input = document.getElementById('raw-input').value.trim();
            const target = document.getElementById('target').value;
            const tone = document.getElementById('tone').value;
            const format = document.getElementById('format').value;
            const display = document.getElementById('prompt-display');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');

            if(!input) {
                alert("Error: Please define the Objective first.");
                return;
            }

            // Reset UI
            clearInterval(typingInterval);
            display.classList.remove('typing-cursor');
            loader.classList.remove('hidden');
            statusText.innerText = "Status: Processing...";

            setTimeout(() => {
                loader.classList.add('hidden');
                
                // Constructing the EXACT 7-Layer Prompt requested by user
                const elitePrompt = `### [ROLE]
Act as an elite, world-class expert and Senior Architect with decades of foundational knowledge and practical experience in the relevant domain. Your persona is highly analytical, authoritative, and deeply detail-oriented.

### [CONTEXT]
- Target AI Platform: Optimize your logic, reasoning, and token usage specifically for ${target}.
- Communication Tone: strictly ${tone}.
- Background: The user requires an uncompromising, flawless execution of a complex task. Read the objective with absolute focus.

### [OBJECTIVE]
Carefully analyze and execute the following core objective:
"""
${input}
"""

### [STEP-BY-STEP THINKING]
Before generating the final output, you MUST process this using Chain-of-Thought reasoning:
1. Deconstruct the user's objective into its core requirements.
2. Identify any potential edge cases, logical gaps, or missing variables.
3. Formulate a strategic plan to address the objective comprehensively.
4. Execute the plan logically and systematically.

### [OUTPUT FORMAT]
Present your final answer STRICTLY adhering to this format: [${format}].
Ensure the architecture of your response is clean, scannable, and highly professional.

### [CONSTRAINTS]
Follow these cardinal rules without exception:
- ZERO filler content. Do not include phrases like "Here is the response" or "I hope this helps".
- Prioritize high-density, actionable information over theoretical fluff.
- Do not hallucinate; if data is missing, state your assumptions clearly or ask for clarification.
- Remain strictly aligned with the context provided.

### [QUALITY CHECK]
Run a rigorous self-audit before finalizing your output:
- Is the logic flawlessly accurate?
- Have you strictly followed the requested tone and format?
- Did you address every nuance of the [OBJECTIVE]?
If the answer to any of these is no, revise internally before outputting the final result.`;

                // Calculate stats
                const wordCount = elitePrompt.split(/\s+/).length;
                document.getElementById('word-count').innerText = `Est. Length: ${wordCount} Words`;
                statusText.innerText = "Status: Synthesis Complete";

                // Trigger Typing Effect
                display.innerText = "";
                display.classList.remove('text-slate-500');
                display.classList.add('text-cyan-50', 'typing-cursor');
                
                // Typing effect speed (index + 6 for faster generation)
                typeWriterEffect(display, elitePrompt, 0);

            }, 1000); 
        }

        // Fast Typing Effect
        function typeWriterEffect(element, text, index) {
            if (index < text.length) {
                let chunk = text.substring(index, index + 6); 
                element.innerHTML += chunk;
                typingInterval = setTimeout(() => typeWriterEffect(element, text, index + 6), 5);
            } else {
                element.classList.remove('typing-cursor');
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('prompt-display').innerText;
            if(text.includes('Awaiting parameters')) return;
            
            navigator.clipboard.writeText(text);
            
            // Visual feedback
            const originalText = document.getElementById('status-text').innerText;
            document.getElementById('status-text').innerText = "Status: Copied to Clipboard!";
            document.getElementById('status-text').classList.add('text-green-400');
            
            setTimeout(() => {
                document.getElementById('status-text').innerText = originalText;
                document.getElementById('status-text').classList.remove('text-green-400');
            }, 3000);
        }
    </script>
</body>
</html>
